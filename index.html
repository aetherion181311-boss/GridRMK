<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Campus Energy Monitor</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-card">
  <div class="auth-logo"><p style="color: rgb(11, 187, 128);">RMK</p>
    CAMPUS<span>ENERGY</span></div>
  <div class="auth-logo-sub">SMART MONITOR · IoT + GAMIFICATION</div>

  <div class="auth-heading">Welcome <em>Back</em></div>
  <div class="auth-sub">Sign in to access the dashboard</div>

  <div class="msg-error"   id="msg-error"></div>
  <div class="msg-success" id="msg-success"></div>

  <div class="form-group">
    <label class="form-label" for="email">Email Address</label>
    <input class="form-input" type="email" id="email"
           placeholder="you@rmkec.ac.in" autocomplete="email" required>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <div class="input-wrap">
      <input class="form-input" type="password" id="password"
             placeholder="••••••••" autocomplete="current-password" required>
      <span class="toggle-pw" onclick="togglePw('password', this)">👁</span>
    </div>
  </div>

  <button class="btn-submit" id="btn-login" onclick="handleLogin()">Sign In</button>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Create one</a>
  </div>
</div>

<script type="module">
  import { signInUser, showError, showSuccess } from "./js/auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { auth } from "./js/firebase-config.js";

  // If already logged in, go straight to dashboard
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "dashboard.html";
  });

  window.handleLogin = async function () {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("btn-login");

    if (!email || !password) {
      showError("msg-error", "Please enter your email and password.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      await signInUser(email, password);
      showSuccess("msg-success", "✓ Signed in! Redirecting…");
      window.location.href = "dashboard.html";
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = "Sign In";
      const messages = {
        "auth/user-not-found":     "No account found with this email.",
        "auth/wrong-password":     "Incorrect password. Try again.",
        "auth/invalid-credential": "Invalid email or password.",
        "auth/too-many-requests":  "Too many failed attempts. Try again later.",
        "auth/invalid-email":      "Please enter a valid email address.",
      };
      showError("msg-error", messages[err.code] || "Login failed. Please try again.");
    }
  };

  window.togglePw = function(id, icon) {
    const input = document.getElementById(id);
    if (input.type === "password") { input.type = "text";     icon.textContent = "🙈"; }
    else                           { input.type = "password"; icon.textContent = "👁"; }
  };

  // Allow Enter key to submit
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") window.handleLogin();
  });
</script>
</body>
</html>
